name: Build vehicle

on:
  workflow_call:

defaults:
  run:
    shell: sh

jobs:
  build-vehicle:
    strategy:
      matrix:
        os:
          - name: "Linux"
            type: ubuntu-latest
          - name: "macOS"
            type: "macos-latest"
          - name: "Windows"
            type: "windows-latest"
        haskell:
          - ghc:
              version: "9.6.5"
            cabal:
              version: "3.14.2.0"
              project-file: "cabal.project"
              extra-args: ""
              extra-args-test-golden: ""
        include:
          # Build with GHC 9.12.2
          # - os:
          #     name: Linux
          #     type: ubuntu-latest
          #   haskell:
          #     ghc:
          #       version: "9.12.2"
          #     cabal:
          #       version: "3.14.2.0"
          #       project-file: "cabal.project"
          #       extra-args: ""
          #       # TODO: Migrate testVerifier to a Haskell executable for portability.
          #       extra-args-test-golden: "--test-option='--allowlist-externals=TestVerifier'"
          # Build with GHC 9.10.2
          # - os:
          #     name: Linux
          #     type: ubuntu-latest
          #   haskell:
          #     ghc:
          #       version: "9.10.2"
          #     cabal:
          #       version: "3.14.2.0"
          #       project-file: "cabal.project"
          #       extra-args: ""
          #       # TODO: Migrate testVerifier to a Haskell executable for portability.
          #       extra-args-test-golden: "--test-option='--allowlist-externals=TestVerifier'"
          # Build with GHC 9.8.4
          - os:
              name: Linux
              type: ubuntu-latest
            haskell:
              ghc:
                version: "9.8.4"
              cabal:
                version: "3.14.2.0"
                project-file: "cabal.project"
                extra-args: ""
                # TODO: Migrate testVerifier to a Haskell executable for portability.
                extra-args-test-golden: "--test-option='--allowlist-externals=TestVerifier'"
          # Build with GHC 9.4.8
          - os:
              name: Linux
              type: ubuntu-latest
            haskell:
              ghc:
                version: "9.4.8"
              cabal:
                version: "3.14.2.0"
                project-file: "cabal.project"
                extra-args: ""
                extra-args-test-golden: ""
          # Build with GHC 9.2.8
          - os:
              name: Linux
              type: ubuntu-latest
            haskell:
              ghc:
                version: "9.2.8"
              cabal:
                version: "3.8.1.0"
                project-file: "cabal.project"
                extra-args: ""
                extra-args-test-golden: ""
          # Build with GHC 9.0.2
          - os:
              name: Linux
              type: ubuntu-latest
            haskell:
              ghc:
                version: "9.0.2"
              cabal:
                version: "3.8.1.0"
                project-file: "cabal.project"
                extra-args: ""
                extra-args-test-golden: ""
          # Build with GHC 8.10.7
          - os:
              name: Linux
              type: ubuntu-latest
            haskell:
              ghc:
                version: "8.10.7"
              cabal:
                version: "3.8.1.0"
                project-file: "cabal.project"
                extra-args: ""
                extra-args-test-golden: ""
          # Build with -fnothunks:
          - os:
              name: Linux
              type: ubuntu-latest
            haskell:
              ghc:
                version: "9.6.5"
              cabal:
                version: "3.14.2.0"
                project-file: "cabal.project.nothunks"
                extra-args: "-fnothunks"
                extra-args-test-golden: ""
          # 20-12-2022:
          # This test is disabled because -fghc-debug requires two threads, which triggers #342.
          # Build with -fghc-debug:
          # - os:
          #     name: Linux
          #     type: ubuntu-latest
          #   haskell:
          #     ghc:
          #       version: "9.6.5"
          #     cabal:
          #       version: "3.14.2.0"
          #       project-file: "cabal.project.ghc-debug"
          #       extra-args: "-fghc-debug"
          # 20-12-2022:
          # This test is disabled because -fghc-debug requires two threads, which triggers #342.
          # Build with -fghc-debug and -fnothunks:
          # - os:
          #     name: Linux
          #     type: ubuntu-latest
          #   haskell:
          #     ghc:
          #       version: "9.6.5"
          #     cabal:
          #       version: "3.14.2.0"
          #       project-file: "cabal.project.ghc-debug.nothunks"
          #       extra-args: "-fghc-debug -fnothunks"

    name: vehicle / ${{ matrix.os.name }} - GHC ${{ matrix.haskell.ghc.version }} ${{ matrix.haskell.cabal.extra-args }}
    runs-on: ${{ matrix.os.type }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠️ Install Haskell
        uses: haskell-actions/setup@v2
        id: setup-haskell
        with:
          ghc-version: ${{ matrix.haskell.ghc.version }}
          cabal-version: ${{ matrix.haskell.cabal.version }}

      - name: 🛠️ Configure
        run: |
          cabal configure --project-file=${{ matrix.haskell.cabal.project-file }}
          cabal build all --project-file=${{ matrix.haskell.cabal.project-file }} --dry-run

      - name: 💾 Restore Cabal dependencies
        uses: actions/cache/restore@v4
        if: ${{ !env.ACT }}
        id: cache-haskell
        env:
          key: ${{ matrix.os.name }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-${{ steps.setup-haskell.outputs.cabal-version }}
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: ${{ env.key }}-plan-${{ hashFiles('dist-newstyle/cache/plan.json') }}
          restore-keys: ${{ env.key }}-

      - name: 🛠️ Install Cabal dependencies
        if: ${{ env.ACT || steps.cache-haskell.outputs.cache-hit != 'true' }}
        run: cabal build all --only-dependencies

      - name: 💾 Save Cabal dependencies
        uses: actions/cache/save@v4
        if: ${{ !env.ACT && steps.cache-haskell.outputs.cache-hit != 'true' }}
        with:
          path: ${{ steps.setup-haskell.outputs.cabal-store }}
          key: ${{ steps.cache-haskell.outputs.cache-primary-key }}

      - name: 🧪 Test Vehicle
        run: |
          cabal test                                                \
            vehicle:test:golden-tests                               \
            vehicle:test:unit-tests                                 \
            --test-show-details=always                              \
            --test-option=--color=always                            \
            --test-option=--num-threads=1                           \
            --project-file=${{ matrix.haskell.cabal.project-file }} \
            ${{ matrix.haskell.cabal.extra-args }}
        shell: sh

      - name: 🏗️ Install Vehicle
        run: |
          mkdir -p bin
          cabal install                                             \
            vehicle:exe:vehicle                                     \
            --overwrite-policy=always                               \
            --install-method=copy                                   \
            --installdir=bin                                        \
            --project-file=${{ matrix.haskell.cabal.project-file }} \
            ${{ matrix.haskell.cabal.extra-args }}
